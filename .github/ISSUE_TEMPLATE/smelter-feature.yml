name: "Smelter: Feature request"
description: Propose a new feature or improvement for Smelter.
labels: ["enhancement", "area: smelter"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem are you trying to solve? What's the use case?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior / API
      description: Sketch request/response shapes, config, or API surfaces if you have them.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: area
    attributes:
      label: Which part of Smelter does this touch?
      multiple: true
      options:
        - Native server / HTTP API
        - TypeScript SDK
        - Rendering / composition
        - Input / output protocols
        - WASM
        - Other
